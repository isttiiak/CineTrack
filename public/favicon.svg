<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#07070f"/>
    </linearGradient>
    <linearGradient id="clap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clapClip">
      <rect x="14" y="17" width="72" height="26" rx="5"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle top-left glow -->
  <rect width="100" height="100" rx="22" fill="url(#glow)"/>

  <!-- Clapperboard body -->
  <rect x="14" y="44" width="72" height="42" rx="5" fill="#0f172a"/>
  <rect x="14" y="44" width="72" height="42" rx="5" fill="none"
        stroke="#818cf8" stroke-width="1.4" stroke-opacity="0.35"/>

  <!-- Clapper top bar -->
  <rect x="14" y="17" width="72" height="26" rx="5" fill="url(#clap)"/>

  <!-- Diagonal stripes clipped to clapper bar -->
  <g clip-path="url(#clapClip)" opacity="0.30">
    <rect x="2"  y="10" width="12" height="40" fill="#1e1b4b" transform="skewX(-28)"/>
    <rect x="20" y="10" width="12" height="40" fill="#1e1b4b" transform="skewX(-28)"/>
    <rect x="38" y="10" width="12" height="40" fill="#1e1b4b" transform="skewX(-28)"/>
    <rect x="56" y="10" width="12" height="40" fill="#1e1b4b" transform="skewX(-28)"/>
    <rect x="74" y="10" width="12" height="40" fill="#1e1b4b" transform="skewX(-28)"/>
  </g>

  <!-- Hinge pins at the fold line -->
  <circle cx="23" cy="44" r="5" fill="#07070f"/>
  <circle cx="23" cy="44" r="2.5" fill="#818cf8" opacity="0.55"/>
  <circle cx="77" cy="44" r="5" fill="#07070f"/>
  <circle cx="77" cy="44" r="2.5" fill="#818cf8" opacity="0.55"/>

  <!-- Sprocket holes on body (film strip feel) -->
  <rect x="17" y="49" width="6" height="6" rx="1.5" fill="#818cf8" opacity="0.18"/>
  <rect x="17" y="72" width="6" height="6" rx="1.5" fill="#818cf8" opacity="0.18"/>
  <rect x="77" y="49" width="6" height="6" rx="1.5" fill="#818cf8" opacity="0.18"/>
  <rect x="77" y="72" width="6" height="6" rx="1.5" fill="#818cf8" opacity="0.18"/>

  <!-- Play triangle — sharp and centered in the body -->
  <polygon points="37,52 37,74 63,63" fill="#818cf8"/>
  <!-- Subtle inner glow on the triangle -->
  <polygon points="37,52 37,74 63,63" fill="url(#clap)" opacity="0.35"/>
</svg>
